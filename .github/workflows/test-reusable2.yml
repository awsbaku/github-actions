name: Test Reusable 2
"on":
  workflow_call:
    inputs:
      team_repo:
        type: string
        required: true
      team_name:
        type: string
        required: true
      team_size:
        type: number
        default: 1
      target_branch:
        type: string
        default: "main"
      max_parallel:
        type: number
        default: 3
      leaderboard_url:
        type: string
        default: ""
      model:
        type: string
        default: "claude-sonnet-4-6"
      hackathon_theme:
        type: string
        default: "aws-bedrock"
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      LEADERBOARD_API_KEY:
        required: false

  workflow_dispatch:
    inputs:
      team_repo:
        type: string
        required: true
      team_name:
        type: string
        required: true
      team_size:
        type: number
        default: 1
      target_branch:
        type: string
        default: "main"
      max_parallel:
        type: number
        default: 3
      leaderboard_url:
        type: string
        default: ""
      model:
        type: string
        default: "claude-sonnet-4-6"
      hackathon_theme:
        type: string
        default: "aws-bedrock"

concurrency:
  group: test-eval-${{ inputs.team_repo }}
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      pr_count: ${{ steps.list.outputs.pr_count }}
    steps:
      - name: List PRs
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "team_repo=${{ inputs.team_repo }}"
          echo "model=${{ inputs.model }}"
          echo "matrix=[{\"number\":1}]" >> "$GITHUB_OUTPUT"
          echo "pr_count=1" >> "$GITHUB_OUTPUT"

  evaluate:
    name: "Eval PR #${{ matrix.pr.number }}"
    needs: discover
    if: needs.discover.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    strategy:
      matrix:
        pr: ${{ fromJSON(needs.discover.outputs.matrix) }}
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      fail-fast: false
    steps:
      - run: echo "Evaluating PR ${{ matrix.pr.number }}"

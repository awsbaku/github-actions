name: Test Secret Pass
"on":
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret availability
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "CLAUDE_CODE_OAUTH_TOKEN is SET (length: ${#SECRET})"
          else
            echo "CLAUDE_CODE_OAUTH_TOKEN is EMPTY"
          fi
        env:
          SECRET: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

name: Hackathon PR Evaluation
run-name: "Evaluate PRs — ${{ inputs.team_repo || github.repository }}"

"on":
  workflow_call:
    inputs:
      team_repo:
        description: "Team repository (owner/repo)"
        type: string
        required: true
      team_name:
        description: "Team display name for leaderboard"
        type: string
        required: true
      team_size:
        description: "Number of team members"
        type: number
        default: 1
      target_branch:
        description: "Branch that PRs target (evaluate PRs into this branch)"
        type: string
        default: "main"
      max_parallel:
        description: "Max concurrent PR evaluations (respect API rate limits)"
        type: number
        default: 3
      model:
        description: "Claude model to use for evaluation"
        type: string
        default: "claude-sonnet-4-6"
      hackathon_theme:
        description: "Evaluation prompt template (filename without .md in prompts/)"
        type: string
        default: "aws-bedrock"
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      CLAUDE_CODE_OAUTH_TOKEN:
        required: false
      AWS_ROLE_ARN:
        required: false

  workflow_dispatch:
    inputs:
      team_repo:
        description: "Team repository (owner/repo)"
        type: string
        required: true
      team_name:
        description: "Team display name"
        type: string
        required: true
      team_size:
        description: "Number of team members"
        type: number
        default: 1
      target_branch:
        description: "Target branch for PRs"
        type: string
        default: "main"
      max_parallel:
        description: "Max concurrent evaluations"
        type: number
        default: 3
      model:
        description: "Claude model"
        type: string
        default: "claude-sonnet-4-6"
      hackathon_theme:
        description: "Evaluation prompt template (filename without .md in prompts/)"
        type: string
        default: "aws-bedrock"

concurrency:
  group: hackathon-eval-${{ inputs.team_repo }}
  cancel-in-progress: false

jobs:
  discover-prs:
    name: Discover Open PRs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      pr_count: ${{ steps.list.outputs.pr_count }}
    steps:
      - name: List open PRs targeting ${{ inputs.target_branch }}
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MATRIX=$(gh pr list \
            --repo "${{ inputs.team_repo }}" \
            --state open \
            --base "${{ inputs.target_branch }}" \
            --json number,title,headRefName,additions,deletions,changedFiles \
            --jq '[.[] | {
              number: .number,
              title: .title,
              branch: .headRefName,
              additions: .additions,
              deletions: .deletions,
              files_changed: .changedFiles
            }]')

          PR_COUNT=$(echo "$MATRIX" | jq 'length')
          echo "Found $PR_COUNT open PRs"

          if [ "$PR_COUNT" -eq 0 ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "pr_count=0" >> "$GITHUB_OUTPUT"
          elif [ "$PR_COUNT" -gt 1 ]; then
            echo "::warning::Team has $PR_COUNT open PRs — only the most recent will be evaluated"

            # Take only the latest PR (first in gh pr list = most recent)
            LATEST=$(echo "$MATRIX" | jq -c '[.[0]]')
            LATEST_NUM=$(echo "$MATRIX" | jq '.[0].number')

            # Post warning on skipped PRs
            for PR_NUM in $(echo "$MATRIX" | jq '.[1:][].number'); do
              gh pr comment "$PR_NUM" \
                --repo "${{ inputs.team_repo }}" \
                --body "> **Evaluation skipped:** Only 1 active PR is evaluated per cycle. PR #$LATEST_NUM was evaluated instead. Close extra PRs to avoid this." \
                2>/dev/null || true
            done

            echo "matrix=$LATEST" >> "$GITHUB_OUTPUT"
            echo "pr_count=1" >> "$GITHUB_OUTPUT"
          else
            # Escape for GH Actions output
            echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"
            echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"
          fi

  evaluate:
    name: "Evaluate PR #${{ matrix.pr.number }}"
    needs: discover-prs
    if: needs.discover-prs.outputs.pr_count != '0'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pr: ${{ fromJSON(needs.discover-prs.outputs.matrix) }}
      max-parallel: ${{ fromJSON(inputs.max_parallel) }}
      fail-fast: false

    steps:
      - name: Checkout team repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.team_repo }}
          fetch-depth: 0

      - name: Checkout evaluation repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/github-actions
          path: judge

      - name: Collect PR metadata and build prompt
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ matrix.pr.number }}
          TEAM_REPO: ${{ inputs.team_repo }}
        run: |
          # Validate prompt template
          PROMPT_FILE="judge/prompts/${{ inputs.hackathon_theme }}.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "::error::Prompt template not found: $PROMPT_FILE"
            ls judge/prompts/*.md 2>/dev/null || echo "No templates found"
            exit 1
          fi

          # Get commit messages for this PR
          COMMITS=$(gh pr view "$PR_NUMBER" \
            --repo "$TEAM_REPO" \
            --json commits \
            --jq '[.commits[].messageHeadline]')

          COMMIT_COUNT=$(echo "$COMMITS" | jq 'length')

          # Get the full diff (truncate to 80KB to stay within context limits)
          DIFF=$(gh pr diff "$PR_NUMBER" --repo "$TEAM_REPO" | head -c 80000)

          # Get PR body/description
          PR_BODY=$(gh pr view "$PR_NUMBER" \
            --repo "$TEAM_REPO" \
            --json body \
            --jq '.body // "No description provided"')

          # Build pr_context.json
          cat > pr_context.json << JSONEOF
          {
            "team": "${{ inputs.team_name }}",
            "repo": "${{ inputs.team_repo }}",
            "pr_number": $PR_NUMBER,
            "pr_title": $(echo '${{ matrix.pr.title }}' | jq -Rs .),
            "pr_description": $(echo "$PR_BODY" | jq -Rs .),
            "team_size": ${{ inputs.team_size }},
            "commit_count": $COMMIT_COUNT,
            "commit_messages": $COMMITS,
            "additions": ${{ matrix.pr.additions }},
            "deletions": ${{ matrix.pr.deletions }},
            "files_changed": ${{ matrix.pr.files_changed }}
          }
          JSONEOF

          echo "$DIFF" > pr_diff.txt

          # Get README
          if [ -f README.md ]; then
            head -c 10000 README.md > team_readme.txt
          else
            echo "No README found." > team_readme.txt
          fi

          # Build the full evaluation prompt with rubric included
          {
            echo "You are a hackathon judge. Evaluate the following PR."
            echo ""
            echo "## Evaluation Rubric"
            cat "$PROMPT_FILE"
            echo ""
            echo "## PR Context"
            cat pr_context.json
            echo ""
            echo "## Team README"
            cat team_readme.txt
            echo ""
            echo "## PR Diff"
            cat pr_diff.txt
            echo ""
            echo "## Instructions"
            echo "Follow the evaluation rubric exactly. Output ONLY valid JSON matching the schema."
            echo "Set timestamp to the current UTC time in ISO 8601 format."
            echo 'Set evaluation_version to "v1.0".'
          } > eval_prompt.txt

          echo "Prompt built: $(wc -c < eval_prompt.txt) bytes"

      - name: Run Claude evaluation
        id: evaluate
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read the file eval_prompt.txt in the current directory. It contains the full evaluation rubric, PR context, team README, and PR diff.

            Follow ALL instructions in that file exactly.

            IMPORTANT: After generating the evaluation JSON, you MUST write it to a file called eval_result.json in the current directory using the Write tool or Bash. The file must contain ONLY the raw JSON object (no markdown fences).
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 10
            --allowedTools "Bash(gh pr view:*)" "Bash(gh pr diff:*)" "Bash(cat:*)" "Bash(echo:*)" "Read" "Glob" "Grep" "Write"

      - name: Verify eval result
        id: verify
        run: |
          if [ -f eval_result.json ] && python3 -c "import json; json.load(open('eval_result.json'))" 2>/dev/null; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "Eval result is valid JSON ($(wc -c < eval_result.json) bytes)"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::eval_result.json missing or invalid"
            cat eval_result.json 2>/dev/null || echo "File not found"
          fi

      - name: Post score to PR
        if: always() && steps.verify.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEAM_REPO: ${{ inputs.team_repo }}
          PR_NUMBER: ${{ matrix.pr.number }}
        run: |
          python3 judge/scripts/post_score.py \
            --result-file eval_result.json \
            --repo "$TEAM_REPO" \
            --pr "$PR_NUMBER"

      - name: Configure AWS credentials
        if: always() && steps.verify.outputs.valid == 'true' && env.HAS_AWS_ROLE == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        env:
          HAS_AWS_ROLE: ${{ secrets.AWS_ROLE_ARN != '' }}
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Submit score to leaderboard
        if: always() && steps.verify.outputs.valid == 'true' && env.HAS_AWS_ROLE == 'true'
        env:
          HAS_AWS_ROLE: ${{ secrets.AWS_ROLE_ARN != '' }}
          LEADERBOARD_FUNCTION: ${{ vars.LEADERBOARD_FUNCTION }}
        run: |
          if [ -z "$LEADERBOARD_FUNCTION" ]; then
            echo "LEADERBOARD_FUNCTION not set — skipping"
            exit 0
          fi
          aws lambda invoke \
            --function-name "$LEADERBOARD_FUNCTION" \
            --payload fileb://eval_result.json \
            --cli-binary-format raw-in-base64-out \
            response.json
          echo "Lambda response:"
          cat response.json
          if grep -q '"error"' response.json; then
            echo "::error::Lambda returned an error"
            exit 1
          fi

      - name: Save evaluation artifact
        if: always() && steps.verify.outputs.valid == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-pr-${{ matrix.pr.number }}
          path: |
            pr_context.json
            eval_result.json
          retention-days: 30

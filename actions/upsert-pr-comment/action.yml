name: Upsert PR Comment
description: Create or update a PR comment identified by a unique marker

inputs:
  marker:
    description: Unique identifier for this comment (used to find and update)
    required: true
  title:
    description: Comment header text
    required: true
  body:
    description: Content to display inside collapsible details
    required: true
  status:
    description: Step outcome (success/failure) for the icon
    required: true
  format:
    description: Code block format (e.g. hcl, json, or empty for plain)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/github-script@v8
      with:
        script: |
          const marker = `<!-- ${{ inputs.marker }} -->`;
          const icon = '${{ inputs.status }}' === 'success' ? '✅' : '❌';
          const fmt = '${{ inputs.format }}';
          const raw = process.env.COMMENT_BODY;
          const content = raw.length === 0 ? 'No issues found.' : raw;
          const truncated = content.length > 60000
            ? content.substring(0, 60000) + '\n\n... truncated ...'
            : content;

          const codeBlock = fmt
            ? `\`\`\`${fmt}\n${truncated}\n\`\`\``
            : `\`\`\`\n${truncated}\n\`\`\``;

          const body = [
            marker,
            `### ${icon} ${{ inputs.title }}`,
            '',
            '<details>',
            '<summary>Show details</summary>',
            '',
            codeBlock,
            '',
            '</details>'
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100
          });

          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }
      env:
        COMMENT_BODY: ${{ inputs.body }}

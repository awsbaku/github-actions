name: Upsert PR Comment
description: Create or update a PR comment identified by a unique marker

inputs:
  marker:
    description: Unique identifier for this comment (used to find and update)
    required: true
  title:
    description: Comment header text
    required: true
  file:
    description: Path to file containing the content to display
    required: false
    default: ''
  body:
    description: Inline content (used if file is not provided)
    required: false
    default: ''
  status:
    description: Step outcome (success/failure) for the icon
    required: true
  format:
    description: Code block format (e.g. hcl, json, or empty for plain)
    required: false
    default: ''
  fallback:
    description: Text to show when content is empty
    required: false
    default: 'No issues found.'

runs:
  using: composite
  steps:
    - uses: actions/github-script@v8
      env:
        INPUT_FILE: ${{ inputs.file }}
        INPUT_BODY: ${{ inputs.body }}
        INPUT_FALLBACK: ${{ inputs.fallback }}
      with:
        script: |
          const fs = require('fs');
          const marker = `<!-- ${{ inputs.marker }} -->`;
          const icon = '${{ inputs.status }}' === 'success' ? '✅' : '❌';
          const fmt = '${{ inputs.format }}';

          // Read from file if provided, otherwise use inline body
          let raw = '';
          const filePath = process.env.INPUT_FILE;
          if (filePath && fs.existsSync(filePath)) {
            raw = fs.readFileSync(filePath, 'utf8').trim();
          } else {
            raw = (process.env.INPUT_BODY || '').trim();
          }

          const content = raw.length === 0 ? process.env.INPUT_FALLBACK : raw;
          const truncated = content.length > 60000
            ? content.substring(0, 60000) + '\n\n... truncated ...'
            : content;

          const codeBlock = fmt
            ? `\`\`\`${fmt}\n${truncated}\n\`\`\``
            : `\`\`\`\n${truncated}\n\`\`\``;

          const body = [
            marker,
            `### ${icon} ${{ inputs.title }}`,
            '',
            '<details>',
            '<summary>Show details</summary>',
            '',
            codeBlock,
            '',
            '</details>'
          ].join('\n');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100
          });

          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: body
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          }

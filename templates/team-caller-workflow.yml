# Copy this file to your team repo at: .github/workflows/eval.yml
#
# Required org-level secrets:
#   ANTHROPIC_API_KEY — Claude API key for evaluations
#
# Required org-level variables:
#   EVAL_ADMINS — JSON array of GitHub usernames allowed to trigger manual evals
#
# Required repo-level variables:
#   TEAM_NAME — Your team's display name (e.g., "Team Alpha")
#   TEAM_SIZE — Number of team members (e.g., 3)
#
# The evaluation runs on a schedule, on PR events, and can be triggered
# manually by organizers listed in EVAL_ADMINS.

name: Hackathon Evaluation
run-name: "Hackathon Score — ${{ github.repository }}"

"on":
  # Scheduled evaluation — adjust cron to your team's assigned time slot
  # Default: every 6 hours. Organizers may assign different offsets per team.
  schedule:
    - cron: "0 */6 * * *"

  # Manual trigger — restricted to EVAL_ADMINS in the job condition
  workflow_dispatch:

  # Evaluate when PRs are opened or updated
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  evaluate:
    if: >-
      (github.event_name == 'schedule') ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'workflow_dispatch' && contains(fromJSON(vars.EVAL_ADMINS || '[]'), github.actor))
    uses: awsbaku/github-actions/.github/workflows/evaluate-prs.yml@main
    with:
      team_repo: ${{ github.repository }}
      team_name: ${{ vars.TEAM_NAME }}
      team_size: ${{ fromJSON(vars.TEAM_SIZE || '1') }}
      target_branch: main
      max_parallel: 3
      hackathon_theme: aws-bedrock
    secrets: inherit
